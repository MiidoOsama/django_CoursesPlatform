{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<!-- START SECTION TOP -->
<section class="section-top">
    <div class="container">
        <div class="col-lg-10 offset-lg-1 text-center">
            <div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0">
                <h1>Signed Out</h1>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li> / Signed Out</li>
                </ul>
            </div>
        </div>
    </div>
</section>
<!-- END SECTION TOP -->

<!-- START LOGOUT MESSAGE -->
<div class="contact_area section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s" data-wow-offset="0">
                <div class="contact text-center" style="background: #f9f9f9; padding: 45px 40px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
                    <div style="font-size: 60px; color: #ff5a1f; margin-bottom: 25px;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <h3 class="mb-3" style="font-family: 'Jost', sans-serif; font-weight: 700; color: #1a1a1a;">Successfully Signed Out</h3>
                    <p class="text-muted mb-4">Thank you for studying with Eduleb. You have successfully logged out of your account.</p>
                    
                    <div class="d-flex flex-column gap-2">
                        <a href="#" class="btn_one w-100" style="padding: 14px; font-weight: 600; border-radius: 5px; text-decoration: none; display: inline-block;">Sign In Again</a>
                        <a href="#" class="btn_one w-100 mt-2" style="background: #1a1a1a; padding: 14px; font-weight: 600; border-radius: 5px; text-decoration: none; display: inline-block;">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- END LOGOUT MESSAGE -->
{% endblock %}
