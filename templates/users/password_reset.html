{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<section class="section-top">
    <div class="container">
        <div class="col-lg-10 offset-lg-1 text-center">
            <div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s" data-wow-offset="0">
                <h1>Reset Password</h1>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li> / Reset Password</li>
                </ul>
            </div>
        </div>
    </div>
</section>

<div class="contact_area section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s" data-wow-offset="0">
                <div class="contact" style="background: #f9f9f9; padding: 40px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);">
                    <h3 class="text-center mb-4" style="font-family: 'Jost', sans-serif; font-weight: 700; color: #1a1a1a;">Forgot Password?</h3>
                    <p class="text-center text-muted mb-4">Enter your email address below, and we'll send you instructions to reset your password.</p>

                    <form class="form" method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="form-group col-md-12 mb-3">
                                <label style="font-weight: 600; margin-bottom: 5px;">Email Address</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required="required" style="height: 50px; border-radius: 5px;">
                            </div>
                            <div class="col-md-12 text-center mt-4">
                                <button type="submit" class="btn_one w-100" style="padding: 14px; font-weight: 600; border-radius: 5px; cursor: pointer;">Send Reset Link</button>
                            </div>
                            <div class="col-md-12 text-center mt-4">
                                <p class="mb-0 text-muted">Remembered password? <a href="#" style="color: #ff5a1f; font-weight: 600; text-decoration: none;">Sign In</a></p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
